<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Taha Rezaei</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
        .error-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
            background: var(--bg-primary);
            color: var(--text-primary);
        }
        .error-container h1 {
            font-size: 6rem;
            font-weight: 800;
            color: #3b82f6;
            margin: 0;
        }
        .error-container h2 {
            font-size: 2rem;
            margin: 0.5rem 0;
        }
        .error-container p {
            color: var(--text-secondary);
            margin: 0.5rem 0 2rem;
        }
        .error-container a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            border: 2px solid #3b82f6;
            padding: 0.6rem 2rem;
            border-radius: 48px;
            transition: 0.2s;
        }
        .error-container a:hover {
            background: #3b82f6;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="./index.html">← Back to Home</a>
    </div>
</body>
</html>
